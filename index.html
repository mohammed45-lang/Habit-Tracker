<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f6fa; color: #1a1a2e; }
        .header { background: white; padding: 18px 40px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .logo span { color: #e94560; }
        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a { text-decoration: none; color: #1a1a2e; font-weight: 500; cursor: pointer; }
        .nav-links a:hover { color: #e94560; }
        .btn-contact { background: #e94560; color: white; border: none; padding: 10px 28px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .hero { text-align: center; padding: 60px 20px; background: white; margin: 30px 40px; border-radius: 20px; }
        .hero h1 { font-size: 44px; }
        .hero h1 span { color: #e94560; }
        .hero .stats { display: flex; justify-content: center; gap: 50px; margin-top: 30px; }
        .hero .stats .number { font-size: 32px; font-weight: 700; color: #e94560; }
        .tabs-container { padding: 0 40px; }
        .tabs { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .tabs button { padding: 12px 32px; border: 2px solid #e9ecef; background: white; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .tabs button.active { background: #e94560; color: white; border-color: #e94560; }
        .habits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .habit-card { background: white; padding: 22px 24px; border-radius: 16px; border-right: 4px solid #e94560; }
        .habit-card .top { display: flex; justify-content: space-between; }
        .habit-card .name { font-weight: 600; }
        .habit-card .category { font-size: 11px; color: #6c757d; background: #f1f3f5; padding: 3px 12px; border-radius: 20px; }
        .habit-card .progress-section { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
        .habit-card .progress-bar { flex: 1; height: 6px; background: #e9ecef; border-radius: 10px; overflow: hidden; }
        .habit-card .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b81); border-radius: 10px; }
        .habit-card .streak { background: #fff3cd; color: #856404; padding: 3px 12px; border-radius: 20px; font-size: 12px; }
        .habit-card input[type="checkbox"] { width: 20px; height: 20px; accent-color: #e94560; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 35px; border-radius: 20px; max-width: 420px; width: 90%; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px 14px; border: 2px solid #e9ecef; border-radius: 12px; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-actions button { flex: 1; padding: 11px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .modal-actions .btn-save { background: #e94560; color: white; }
        .modal-actions .btn-cancel { background: #e9ecef; color: #1a1a2e; }
        .toast { position: fixed; bottom: 30px; left: 30px; background: #28a745; color: white; padding: 14px 28px; border-radius: 16px; transform: translateY(100px); opacity: 0; transition: 0.4s ease; z-index: 2000; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Habit<span>Tracker</span></div>
        <nav class="nav-links">
            <a onclick="showTab('daily')">الرئيسية</a>
            <a onclick="showTab('daily')">عاداتي</a>
            <a onclick="showTab('health')">الصحة</a>
            <a onclick="showTab('reports')">التقارير</a>
            <button class="btn-contact" onclick="openModal()">+ إضافة عادة</button>
        </nav>
    </header>

    <section class="hero">
        <h1>حياتك <span>يوم بيوم</span></h1>
        <p>تابع عاداتك اليومية، حسّن صحتك، وابني نسخة أفضل من نفسك</p>
        <div class="stats">
            <div><div class="number" id="totalHabits">3</div><div>إجمالي العادات</div></div>
            <div><div class="number" id="completedToday">1</div><div>أنجزت اليوم</div></div>
            <div><div class="number" id="bestStreak">12</div><div>أطول سلسلة</div></div>
        </div>
    </section>

    <div class="tabs-container">
        <div class="tabs">
            <button class="active" onclick="showTab('daily')">☀️ العادات اليومية</button>
            <button onclick="showTab('health')">💪 الصحة البدنية</button>
        </div>

        <div id="dailyTab">
            <div class="habits-grid" id="habitsGrid"></div>
        </div>

        <div id="healthTab" style="display:none;">
            <div class="health-grid" id="healthGrid"></div>
        </div>

        <div id="reportsTab" style="display:none;">
            <div id="reportContent"></div>
        </div>
    </div>

    <div class="modal" id="habitModal">
        <div class="modal-content">
            <h2>➕ إضافة عادة جديدة</h2>
            <label>اسم العادة</label>
            <input type="text" id="habitNameInput" placeholder="مثال: قراءة 10 صفحات" />
            <label>الفئة</label>
            <select id="habitCategory">
                <option value="يومية">يومية</option>
                <option value="صحية">صحية</option>
                <option value="رياضية">رياضية</option>
                <option value="ذهنية">ذهنية</option>
            </select>
            <label>الهدف اليومي</label>
            <input type="number" id="habitTarget" value="1" min="1" />
            <div class="modal-actions">
                <button class="btn-save" onclick="saveHabit()">💾 حفظ</button>
                <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let habits = [
            { id: 1, name: '🚶 مشي 30 دقيقة', category: 'رياضية', progress: 70, streak: 5, done: false },
            { id: 2, name: '💧 شرب 2 لتر ماء', category: 'صحية', progress: 45, streak: 3, done: false },
            { id: 3, name: '📖 قراءة 10 صفحات', category: 'ذهنية', progress: 90, streak: 12, done: false },
        ];
        let editingId = null;

        function renderHabits() {
            const grid = document.getElementById('habitsGrid');
            grid.innerHTML = habits.map(h => `
                <div class="habit-card">
                    <div class="top">
                        <span class="name">${h.name}</span>
                        <span class="category">${h.category}</span>
                    </div>
                    <div class="progress-section">
                        <input type="checkbox" ${h.done ? 'checked' : ''} onchange="toggleHabit(${h.id})" />
                        <div class="progress-bar"><div class="progress-fill" style="width:${h.progress}%;"></div></div>
                        <span>${h.progress}%</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:12px;">
                        <span class="streak">🔥 ${h.streak} يوم</span>
                        <div>
                            <button onclick="editHabit(${h.id})">✏️</button>
                            <button onclick="deleteHabit(${h.id})">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalHabits').textContent = habits.length;
            document.getElementById('completedToday').textContent = habits.filter(h => h.done).length;
            document.getElementById('bestStreak').textContent = Math.max(...habits.map(h => h.streak));
        }

        function toggleHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (habit) {
                habit.done = !habit.done;
                habit.progress = habit.done ? Math.min(100, habit.progress + 10) : Math.max(0, habit.progress - 10);
                habit.streak = habit.done ? habit.streak + 1 : Math.max(0, habit.streak - 1);
                renderHabits();
                showToast(habit.done ? '✅ أحسنت!' : '⏳ استمر غداً');
            }
        }

        function openModal(habit = null) {
            document.getElementById('habitModal').classList.add('show');
            if (habit) {
                document.getElementById('habitNameInput').value = habit.name;
                document.getElementById('habitCategory').value = habit.category;
                document.getElementById('habitTarget').value = habit.target || 1;
                editingId = habit.id;
            } else {
                document.getElementById('habitNameInput').value = '';
                editingId = null;
            }
        }

        function closeModal() {
            document.getElementById('habitModal').classList.remove('show');
        }

        function saveHabit() {
            const name = document.getElementById('habitNameInput').value.trim();
            if (!name) { showToast('❌ أدخل اسم العادة', 'error'); return; }
            
            if (editingId) {
                const habit = habits.find(h => h.id === editingId);
                if (habit) {
                    habit.name = name;
                    habit.category = document.getElementById('habitCategory').value;
                }
                showToast('✅ تم التعديل');
            } else {
                habits.push({
                    id: Date.now(),
                    name,
                    category: document.getElementById('habitCategory').value,
                    progress: 0,
                    streak: 0,
                    done: false
                });
                showToast('🎉 تم الإضافة');
            }
            renderHabits();
            closeModal();
        }

        function deleteHabit(id) {
            if (confirm('متأكد؟')) {
                habits = habits.filter(h => h.id !== id);
                renderHabits();
                showToast('🗑️ تم الحذف');
            }
        }

        function editHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (habit) openModal(habit);
        }

        function showTab(tab) {
            document.getElementById('dailyTab').style.display = tab === 'daily' ? 'block' : 'none';
            document.getElementById('healthTab').style.display = tab === 'health' ? 'block' : 'none';
            document.getElementById('reportsTab').style.display = tab === 'reports' ? 'block' : 'none';
            
            if (tab === 'health') renderHealth();
            if (tab === 'reports') renderReports();
        }

        function renderHealth() {
            const data = [
                { icon: '🚶', name: 'خطوات اليوم', value: '0', target: '10,000' },
                { icon: '💧', name: 'شرب الماء', value: '0', target: '2L' },
                { icon: '😴', name: 'ساعات النوم', value: '0', target: '8h' },
            ];
            document.getElementById('healthGrid').innerHTML = data.map(item => `
                <div class="habit-card" style="text-align:center;">
                    <div style="font-size:36px;">${item.icon}</div>
                    <h3>${item.name}</h3>
                    <p>الهدف: ${item.target}</p>
                    <div style="font-size:24px;font-weight:700;color:#e94560;">${item.value}</div>
                </div>
            `).join('');
        }

        function renderReports() {
            document.getElementById('reportContent').innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px;">
                    <div class="habit-card" style="text-align:center;"><div style="font-size:32px;color:#e94560;">${habits.length}</div><div>إجمالي العادات</div></div>
                    <div class="habit-card" style="text-align:center;"><div style="font-size:32px;color:#e94560;">${habits.filter(h=>h.done).length}</div><div>منجزة</div></div>
                    <div class="habit-card" style="text-align:center;"><div style="font-size:32px;color:#e94560;">${Math.round(habits.reduce((s,h)=>s+h.progress,0)/habits.length)}%</div><div>متوسط التقدم</div></div>
                    <div class="habit-card" style="text-align:center;"><div style="font-size:32px;color:#e94560;">${Math.max(...habits.map(h=>h.streak))}</div><div>أطول سلسلة</div></div>
                </div>
                <div class="habit-card" style="padding:30px;text-align:center;">
                    <h3>📊 أداء هذا الأسبوع</h3>
                    <div style="display:flex;gap:20px;justify-content:center;margin-top:20px;">
                        ${[65,45,80,70,90,55,75].map((v,i) => `
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <div style="width:30px;height:${v*2}px;background:linear-gradient(180deg,#e94560,#ff6b81);border-radius:8px 8px 0 0;"></div>
                                <span style="font-size:11px;">${['س','أ','إ','ث','أ','خ','ج'][i]}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show';
            if (type === 'error') t.style.background = '#dc3545';
            else t.style.background = '#28a745';
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
        }

        renderHabits();
        renderHealth();
    </script>
</body>
</html>
